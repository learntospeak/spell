<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Science Practice</title>
  <link rel="stylesheet" href="curriculum.css" />
</head>
<body data-subject="science">
  <div id="celebrationContainer" class="celebration-container"></div>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">S</span>
        <span>Skill Hub</span>
      </a>
      <nav class="nav" aria-label="Subjects">
        <a href="index.html">Home</a>
        <a href="spelling.html">Spelling</a>
        <a href="maths.html">Maths</a>
        <a href="english.html">English</a>
        <a class="active" href="science.html">Science</a>
      </nav>
    </header>

    <section class="hero">
      <p class="eyebrow">Science</p>
      <h1>Predict, observe, and explain.</h1>
      <p class="subhead">Materials, living things, forces, fair testing, shadows, and energy.</p>
    </section>

    <section class="layout">
      <article class="practice-card">
        <div class="controls">
          <label>
            Stage
            <select id="stageSelect">
              <option value="all">All stages</option>
              <option value="2">Stage 2</option>
              <option value="3">Stage 3</option>
            </select>
          </label>
          <label>
            Skill
            <select id="skillSelect"></select>
          </label>
        </div>

        <div id="question" class="question"></div>
        <div id="choices" class="choices"></div>

        <form id="answerForm" class="answer-form" autocomplete="off">
          <input id="answerInput" type="text" autocomplete="off" placeholder="Type your answer" />
          <button class="primary" type="submit">Check</button>
        </form>

        <p id="hint" class="note"></p>
        <div class="button-row">
          <button id="hintBtn" type="button">Hint</button>
          <button id="coachBtn" type="button">Coach</button>
          <button id="nextBtn" type="button">Next</button>
          <button id="soundToggle" type="button">Sound off</button>
        </div>
        <div id="feedback" class="feedback" role="status"></div>
        <div id="coachBox" class="coach-box" hidden></div>
      </article>

      <aside class="panel">
        <h2>Progress</h2>
        <div id="progressList" class="progress-list"></div>
        <p class="note">The next question leans toward skills that need more practice.</p>
        <button id="resetProgressBtn" class="ghost" type="button">Reset</button>
      </aside>
    </section>
  </main>
  <script src="curriculum.js"></script>
</body>
</html>
